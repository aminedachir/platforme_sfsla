# render.yaml
# -----------
# Render Blueprint – defines the web service for PSFSLA.
# Commit this file to your repo; Render picks it up automatically.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: psfsla
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "run:app" --workers 2 --threads 2 --timeout 120 --bind 0.0.0.0:$PORT
    autoDeploy: true          # redeploy on every push to main

    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true   # Render generates a secure random value
      - key: DATABASE_URL
        fromDatabase:
          name: psfsla-db     # matches the database block below (or use Neon URL)
          property: connectionString
      # ── Cloudinary – add manually in Render dashboard ──
      - key: CLOUDINARY_URL
        sync: false           # set manually in dashboard
      - key: DEFAULT_AVATAR_URL
        sync: false
      - key: DEFAULT_THUMBNAIL_URL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: MAIL_SERVER
        sync: false
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USE_TLS
        value: "True"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_DEFAULT_SENDER
        sync: false

# ── If you use Render's built-in PostgreSQL instead of Neon ───
# (comment this out if you use Neon and set DATABASE_URL manually)
# databases:
#   - name: psfsla-db
#     databaseName: psfsla
#     user: psfsla
#     plan: free
